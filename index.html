<script>
function imprimirChecklist() {

  const equipamentos = document.querySelectorAll(".equipamento");
  let conteudo = "";

  equipamentos.forEach((eq, i) => {

    conteudo += `
      <div style="margin-bottom: 20px;">
        <hr>
        <h3>Equipamento ${i + 1}</h3>
        <p><strong>Nome:</strong> ${eq.querySelector(".nome").value}</p>
        <p><strong>Status:</strong> ${eq.querySelector(".status").value}</p>
        <p><strong>Observações:</strong> ${eq.querySelector(".obs").value}</p>
        <p><strong>Técnico:</strong> ${eq.querySelector(".tecnico").value}</p>
        <p><strong>Analista:</strong> ${eq.querySelector(".analista").value}</p>
    `;

    eq.querySelectorAll("img").forEach(img => {
      if (img.src) {
        conteudo += `
          <img src="${img.src}" 
          style="display:block;margin:15px auto;max-width:550px;max-height:450px;border:1px solid #ccc;">
        `;
      }
    });

    conteudo += `</div>`;
  });

  const janela = window.open('', '_blank');

  janela.document.write(`
    <html>
    <head>
      <style>
        body { font-family: Arial; margin:0; }

        header {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: 60px;
          text-align: center;
          border-bottom: 2px solid #000;
          background: #fff;
          font-weight: bold;
          line-height: 60px;
        }

        main {
          margin-top: 70px;
          padding: 15px;
        }

        footer {
          position: fixed;
          bottom: 0;
          right: 20px;
          font-size: 12px;
        }

        .page-number:after {
          content: counter(page);
        }

        h3 {
          margin-top: 10px;
        }

        /* 🔥 ESSENCIAL: evitar quebra logo após os dados */
        .dados {
          margin-bottom: 10px;
        }

        /* 🚀 Garante que o primeiro bloco não pule */
        .equipamento:first-child {
          page-break-before: auto;
        }

      </style>
    </head>

    <body>

      <header>
        Relatório Técnico de Equipamentos
      </header>

      <main>

        <!-- ✅ DADOS SOMENTE NA PRIMEIRA PÁGINA -->
        <div class="dados">
          <p><strong>Projeto:</strong> REFIT</p>
          <p><strong>Loja:</strong> 123</p>
          <p><strong>Responsável:</strong> Fulano</p>
          <p><strong>Data:</strong> 27/03/2026, 10:03:39</p>
          <p><strong>Início:</strong> 01/01/2026</p>
          <p><strong>Término:</strong> 03/02/2026</p>
        </div>

        ${conteudo}

      </main>

      <footer>
        Página <span class="page-number"></span>
      </footer>

    </body>
    </html>
  `);

  janela.document.close();

  setTimeout(() => {
    janela.print();
  }, 500);
}
</script>
