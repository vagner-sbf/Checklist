<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist</title>

<style>
body {
  font-family: Arial;
  background: #f0f0f0;
  padding: 20px;
}

.container {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

input, select, textarea {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
}

img {
  max-width: 150px;
  display: none;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Checklist</h2>

<input id="projeto" placeholder="Projeto">
<input id="loja" placeholder="Loja">
<input id="responsavel" placeholder="Responsável">

<input id="data" readonly>
<input id="inicio" placeholder="Data início">
<input id="fim" placeholder="Data fim">

<div id="lista"></div>

<button onclick="add()">Adicionar Equipamento</button>
<button onclick="printar()">Consolidar / Imprimir</button>

</div>

<script>

window.onload = function(){
  document.getElementById("data").value = new Date().toLocaleString();
  add();
}

let contador = 0;

function add(){
  contador++;

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>Equipamento ${contador}</h3>

    <input placeholder="Nome" class="nome">

    <select class="status">
      <option>Funcionando</option>
      <option>Com problema</option>
      <option>Não funciona</option>
    </select>

    <input type="file" accept="image/*" onchange="img(event,this)">
    <img>

    <textarea placeholder="Observações" class="obs"></textarea>
    <input placeholder="Técnico" class="tecnico">
    <input placeholder="Analista" class="analista">
  `;

  document.getElementById("lista").appendChild(div);
}

function img(e,input){
  const file = e.target.files[0];
  const imgTag = input.nextElementSibling;

  if(file){
    const reader = new FileReader();

    reader.onload = function(ev){
      imgTag.src = ev.target.result;
      imgTag.style.display = "block";
    };

    reader.readAsDataURL(file);
  }
}

function printar(){

  let html = "";

  document.querySelectorAll(".card").forEach((c, i) => {

    const nome = c.querySelector(".nome").value;
    const status = c.querySelector(".status").value;
    const obs = c.querySelector(".obs").value;
    const tecnico = c.querySelector(".tecnico").value;
    const analista = c.querySelector(".analista").value;
    const img = c.querySelector("img");

    let imagemHTML = "";
    if (img && img.src) {
      imagemHTML = '<img src="' + img.src + '" style="max-width:200px;">';
    }

    html += `
      <table style="width:100%; margin-bottom:20px;">
        <tr>
          <td style="width:60%;">
            <h3>Equipamento ${i+1}</h3>
            <p><b>Nome:</b> ${nome}</p>
            <p><b>Status:</b> ${status}</p>
            <p><b>Obs:</b> ${obs}</p>
          </td>

          <td style="width:40%; text-align:center;">
            ${imagemHTML}
          </td>
        </tr>

        <tr>
          <td colspan="2" style="text-align:center;">
            <p><b>Técnico:</b> ${tecnico}</p>
            <p><b>Analista:</b> ${analista}</p>
          </td>
        </tr>
      </table>
    `;
  });

  const w = window.open();

  const pagina = `
    <html>
    <head>
      <meta charset="UTF-8">
      <style>
        body { font-family: Arial; background:#ddd; }
        .pagina { background:#fff; padding:20px; margin:20px auto; max-width:800px; }
      </style>
    </head>

    <body>
      <div class="pagina">

        <h2>Relatório Técnico</h2>

        <p>Projeto: ${document.getElementById("projeto").value}</p>
        <p>Loja: ${document.getElementById("loja").value}</p>
        <p>Responsável: ${document.getElementById("responsavel").value}</p>
        <p>Data: ${document.getElementById("data").value}</p>
        <p>Início: ${document.getElementById("inicio").value}</p>
        <p>Término: ${document.getElementById("fim").value}</p>

        <hr>

        ${html}

      </div>
    </body>
    </html>
  `;

  w.document.write(pagina);
  w.document.close();

  setTimeout(()=>w.print(),500);
}

</script>

</body>
</html>
