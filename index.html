<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist Profissional</title>

<style>
body {
  font-family: Arial;
  background: #eef1f5;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

.card {
  background: #fff;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  width: 100%;
  font-size: 16px;
}

.add {
  background: #28a745;
  color: white;
}

.print {
  background: #007bff;
  color: white;
}

img {
  max-width: 100%;
  margin-top: 10px;
  display: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<h2>Checklist de Equipamentos</h2>

<div class="card">
<label>Projeto</label>
<input id="projeto">

<label>Loja</label>
<input id="loja">

<label>Responsável</label>
<input id="responsavel">

<label>Data</label>
<input id="data" readonly>

<label>Início</label>
<input id="inicio">

<label>Término</label>
<input id="fim">
</div>

<div id="lista"></div>

<button class="add" onclick="add()">+ Adicionar Equipamento</button>
<button class="print" onclick="printar()">Consolidar / Imprimir</button>

</div>

<script>
document.getElementById("data").value = new Date().toLocaleString();

let contador = 0;

function add() {
  contador++;

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>Equipamento ${contador}</h3>

    <label>Nome</label>
    <input class="nome">

    <label>Status</label>
    <select class="status">
      <option>Funcionando</option>
      <option>Com problema</option>
      <option>Não funciona</option>
    </select>

    <label>Foto</label>
    <input type="file" accept="image/*" onchange="preview(event,this)">
    <img>

    <label>Observações</label>
    <textarea class="obs"></textarea>

    <label>Técnico</label>
    <input class="tecnico">

    <label>Analista</label>
    <input class="analista">
  `;

  document.getElementById("lista").appendChild(div);
}

// 🔥 COMPRESSÃO DE IMAGEM
function preview(e, input) {
  const img = input.nextElementSibling;
  const file = e.target.files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = function(event) {
      const image = new Image();
      image.src = event.target.result;

      image.onload = function() {
        const canvas = document.createElement("canvas");
        const maxWidth = 800;

        let scale = maxWidth / image.width;
        let width = maxWidth;
        let height = image.height * scale;

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(image, 0, 0, width, height);

        const compressed = canvas.toDataURL("image/jpeg", 0.7);

        img.src = compressed;
        img.style.display = "block";
      };
    };

    reader.readAsDataURL(file);
  }
}

function printar() {

  let conteudo = "";

  document.querySelectorAll(".card").forEach((c,i)=>{
    if(c.querySelector(".nome")){
      conteudo += `
        <div style="page-break-inside: avoid; margin-bottom:30px;">
        <h3>Equipamento ${i}</h3>
        <p><b>Nome:</b> ${c.querySelector(".nome").value}</p>
        <p><b>Status:</b> ${c.querySelector(".status").value}</p>
        <p><b>Obs:</b> ${c.querySelector(".obs").value}</p>
        <p><b>Técnico:</b> ${c.querySelector(".tecnico").value}</p>
        <p><b>Analista:</b> ${c.querySelector(".analista").value}</p>
      `;

      const img = c.querySelector("img");
      if(img && img.src){
        conteudo += `
          <div style="text-align:center; page-break-inside: avoid;">
            <img src="${img.src}" style="
              max-width: 90%;
              max-height: 600px;
              object-fit: contain;
              margin-top:10px;
            ">
          </div>
        `;
      }

      conteudo += `</div><hr>`;
    }
  });

  const w = window.open();

  w.document.write(`
    <html>
    <head>
      <style>
        body { font-family: Arial; padding: 20px; }

        img {
          display: block;
          margin: auto;
        }
      </style>
    </head>
    <body>

    <h2 style="text-align:center">Relatório Técnico</h2>

    <p>Projeto: ${projeto.value}</p>
    <p>Loja: ${loja.value}</p>
    <p>Responsável: ${responsavel.value}</p>
    <p>Data: ${data.value}</p>
    <p>Início: ${inicio.value}</p>
    <p>Término: ${fim.value}</p>

    <hr>

    ${conteudo}

    </body>
    </html>
  `);

  w.document.close();
  setTimeout(()=>w.print(),500);
}

add();
</script>

</body>
</html>
