<script>
function imprimirChecklist() {

  const equipamentos = document.querySelectorAll(".equipamento");
  let conteudo = "";

  equipamentos.forEach((eq, i) => {

    conteudo += `
      <div class="equipamento-bloco">
        <hr>
        <h3>Equipamento ${i + 1}</h3>
        <p><strong>Nome:</strong> ${eq.querySelector(".nome").value}</p>
        <p><strong>Status:</strong> ${eq.querySelector(".status").value}</p>
        <p><strong>Observações:</strong> ${eq.querySelector(".obs").value}</p>
        <p><strong>Técnico:</strong> ${eq.querySelector(".tecnico").value}</p>
        <p><strong>Analista:</strong> ${eq.querySelector(".analista").value}</p>
    `;

    eq.querySelectorAll("img").forEach(img => {
      if (img.src) {
        conteudo += `<img src="${img.src}">`;
      }
    });

    conteudo += `</div>`;
  });

  const janela = window.open('', '_blank');

  janela.document.write(`
    <html>
    <head>
      <style>
        body {
          font-family: Arial;
          margin: 0;
        }

        /* ✅ HEADER EM TODAS AS PÁGINAS */
        header {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: 110px;
          border-bottom: 2px solid #000;
          background: #fff;
          padding: 10px 20px;
          font-size: 13px;
        }

        header h2 {
          text-align: center;
          margin: 0 0 5px 0;
        }

        main {
          margin-top: 120px;
          padding: 15px;
        }

        footer {
          position: fixed;
          bottom: 0;
          right: 20px;
          font-size: 12px;
        }

        .page-number:after {
          content: counter(page);
        }

        .equipamento-bloco {
          margin-bottom: 20px;
          page-break-inside: auto;
        }

        img {
          display: block;
          margin: 15px auto;
          max-width: 500px;
          max-height: 400px;
        }

      </style>
    </head>

    <body>

      <!-- ✅ AGORA REPETE EM TODAS AS PÁGINAS -->
      <header>
        <h2>Relatório Técnico de Equipamentos</h2>

        <p><strong>Projeto:</strong> REFIT</p>
        <p><strong>Loja:</strong> CE123</p>
        <p><strong>Responsável:</strong> Fulano</p>
        <p><strong>Data:</strong> 27/03/2026, 10:10:04</p>
        <p><strong>Início:</strong> 01/01/2026</p>
        <p><strong>Término:</strong> 03/02/2026</p>
      </header>

      <main>
        ${conteudo}
      </main>

      <footer>
        Página <span class="page-number"></span>
      </footer>

    </body>
    </html>
  `);

  janela.document.close();

  setTimeout(() => {
    janela.print();
  }, 500);
}
</script>
