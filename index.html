<script>
function imprimirChecklist() {

  const elemento = document.getElementById("conteudo");

  if (!elemento) {
    alert("Erro: elemento 'conteudo' não encontrado.");
    return;
  }

  const conteudo = elemento.innerHTML;

  const janela = window.open('', '_blank');

  if (!janela) {
    alert("Pop-up bloqueado. Permita pop-ups para funcionar.");
    return;
  }

  janela.document.write(`
    <html>
    <head>
      <title>Relatório Técnico</title>

      <style>
        body {
          font-family: Arial;
          margin: 0;
        }

        header {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: 60px;
          text-align: center;
          border-bottom: 2px solid #000;
          background: #fff;
          font-weight: bold;
          font-size: 18px;
          line-height: 60px;
        }

        main {
          margin-top: 80px;
          padding: 20px;
        }

        img {
          display: block;
          margin: 20px auto;
          max-width: 500px;
          max-height: 400px;
        }

        footer {
          position: fixed;
          bottom: 0;
          right: 20px;
          font-size: 12px;
        }

        .page-number:after {
          content: counter(page);
        }
      </style>
    </head>

    <body>

      <header>
        Relatório Técnico de Equipamentos
      </header>

      <main>

        <p><strong>Projeto:</strong> REFIT</p>
        <p><strong>Loja:</strong> 238</p>
        <p><strong>Responsável:</strong> Diego</p>
        <p><strong>Data:</strong> 27/03/2026, 09:31:28</p>
        <p><strong>Início:</strong> 01/01/2026</p>
        <p><strong>Término:</strong> 03/02/2026</p>

        <hr>

        ${conteudo}

      </main>

      <footer>
        Página <span class="page-number"></span>
      </footer>

    </body>
    </html>
  `);

  janela.document.close();

  setTimeout(() => {
    janela.print();
  }, 500);
}
</script>
