<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist Profissional</title>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
}

button {
  padding: 12px;
  border: none;
  cursor: pointer;
  width: 100%;
  font-size: 16px;
}

.add {
  background: green;
  color: white;
}

.print {
  background: #007bff;
  color: white;
}

img {
  max-width: 100%;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h2>Checklist de Equipamentos</h2>

<div class="card">
<input id="projeto" placeholder="Projeto">
<input id="loja" placeholder="Loja">
<input id="responsavel" placeholder="Responsável">
<input id="data" readonly>
<input id="inicio" placeholder="Data início">
<input id="fim" placeholder="Data término">
</div>

<div id="lista"></div>

<button class="add" onclick="add()">+ Adicionar Equipamento</button>
<button class="print" onclick="printar()">Consolidar / Imprimir</button>

</div>

<script>
document.getElementById("data").value = new Date().toLocaleString();

function add() {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <input placeholder="Equipamento" class="nome">
    <select class="status">
      <option>Funcionando</option>
      <option>Com problema</option>
      <option>Não funciona</option>
    </select>
    <input type="file" onchange="img(event,this)">
    <img>
    <textarea placeholder="Observações" class="obs"></textarea>
    <input placeholder="Técnico" class="tecnico">
    <input placeholder="Analista" class="analista">
  `;

  document.getElementById("lista").appendChild(div);
}

function img(e, input) {
  const img = input.nextElementSibling;
  const file = e.target.files[0];

  if (file) {
    const r = new FileReader();
    r.onload = ev => {
      img.src = ev.target.result;
      img.style.display = "block";
    };
    r.readAsDataURL(file);
  }
}

function printar() {

  let html = "";

  document.querySelectorAll(".card").forEach((c,i)=>{
    if(c.querySelector(".nome")){
      html += `<h3>Equipamento ${i}</h3>`;
      html += `<p>${c.querySelector(".nome").value}</p>`;
      html += `<p>${c.querySelector(".obs").value}</p>`;

      const img = c.querySelector("img");
      if(img && img.src){
        html += `<img src="${img.src}" style="max-width:400px">`;
      }
    }
  });

  const w = window.open();

  w.document.write(`
    <html>
    <body>
    <h2>Relatório</h2>

    <p>Projeto: ${projeto.value}</p>
    <p>Loja: ${loja.value}</p>
    <p>Responsável: ${responsavel.value}</p>
    <p>Data: ${data.value}</p>
    <p>Início: ${inicio.value}</p>
    <p>Término: ${fim.value}</p>

    <hr>

    ${html}

    </body>
    </html>
  `);

  w.document.close();
  setTimeout(()=>w.print(),500);
}

add();
</script>

</body>
</html>
