<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist de Equipamentos</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f4f4f4;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  border: none;
  cursor: pointer;
}

.add { background: green; color: white; }
.print { background: #007bff; color: white; }

img {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Checklist de Equipamentos</h2>

<div class="card">
<label>Projeto</label>
<input id="projeto">

<label>Loja</label>
<input id="loja">

<label>Responsável</label>
<input id="responsavel">

<label>Data</label>
<input id="data" readonly>

<label>Início</label>
<input id="inicio">

<label>Término</label>
<input id="fim">
</div>

<div id="equipamentos"></div>

<button class="add" onclick="adicionar()">+ Equipamento</button>
<button class="print" onclick="imprimir()">Consolidar / Imprimir</button>

</div>

<script>
try {

document.getElementById("data").value = new Date().toLocaleString();

let contador = 0;

function adicionar() {
  contador++;

  const div = document.createElement("div");
  div.className = "card equipamento";

  div.innerHTML = `
    <h3>Equipamento ${contador}</h3>

    <input placeholder="Nome do equipamento" class="nome">

    <select class="status">
      <option>Funcionando</option>
      <option>Com problema</option>
      <option>Não funciona</option>
    </select>

    <input type="file" accept="image/*" onchange="preview(event,this)">
    <img style="display:none">

    <textarea placeholder="Observações" class="obs"></textarea>

    <input placeholder="Técnico" class="tecnico">
    <input placeholder="Analista" class="analista">
  `;

  document.getElementById("equipamentos").appendChild(div);
}

function preview(e, input) {
  const img = input.nextElementSibling;
  const file = e.target.files[0];

  if (file) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      img.src = ev.target.result;
      img.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
}

function imprimir() {

  let conteudo = "";

  document.querySelectorAll(".equipamento").forEach((eq, i) => {

    conteudo += `
      <div style="margin-bottom:20px;">
        <hr>
        <h3>Equipamento ${i+1}</h3>
        <p><strong>Nome:</strong> ${eq.querySelector(".nome").value}</p>
        <p><strong>Status:</strong> ${eq.querySelector(".status").value}</p>
        <p><strong>Observações:</strong> ${eq.querySelector(".obs").value}</p>
        <p><strong>Técnico:</strong> ${eq.querySelector(".tecnico").value}</p>
        <p><strong>Analista:</strong> ${eq.querySelector(".analista").value}</p>
    `;

    const img = eq.querySelector("img");
    if (img && img.src) {
      conteudo += `<img src="${img.src}" style="max-width:500px;display:block;margin:auto;">`;
    }

    conteudo += `</div>`;
  });

  const w = window.open('', '_blank');

  w.document.write(`
    <html>
    <head>
      <style>
        body { font-family: Arial; margin: 20px; }

        header {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: 120px;
          background: #fff;
          border-bottom: 2px solid #000;
          padding: 10px;
          font-size: 13px;
        }

        main {
          margin-top: 130px;
        }

        footer {
          position: fixed;
          bottom: 10px;
          right: 20px;
          font-size: 12px;
        }

        .page-number:after {
          content: counter(page);
        }
      </style>
    </head>

    <body>

      <header>
        <h3 style="text-align:center;margin:0;">Relatório Técnico</h3>

        <p>Projeto: ${projeto.value}</p>
        <p>Loja: ${loja.value}</p>
        <p>Responsável: ${responsavel.value}</p>
        <p>Data: ${data.value}</p>
        <p>Início: ${inicio.value}</p>
        <p>Término: ${fim.value}</p>
      </header>

      <main>
        ${conteudo}
      </main>

      <footer>
        Página <span class="page-number"></span>
      </footer>

    </body>
    </html>
  `);

  w.document.close();
  setTimeout(()=>w.print(),500);
}

adicionar();

} catch(e) {
  document.body.innerHTML = "<h1>Erro no código</h1><pre>" + e + "</pre>";
}
</script>

</body>
</html>
