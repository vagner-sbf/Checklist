<script>
function imprimirChecklist() {
  const conteudo = document.getElementById("conteudo").innerHTML;

  const janela = window.open('', '', 'width=900,height=700');

  janela.document.write(`
    <html>
    <head>
      <title>Relatório Técnico</title>

      <style>
        body {
          font-family: Arial;
          margin: 0;
          padding: 0;
        }

        header {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: 60px;
          text-align: center;
          border-bottom: 2px solid #000;
          background: #fff;
          font-weight: bold;
          font-size: 18px;
          line-height: 60px;
        }

        main {
          margin-top: 80px;
          padding: 20px;
        }

        .primeira-pagina {
          margin-bottom: 30px;
        }

        .equipamento {
          page-break-inside: avoid;
          margin-bottom: 30px;
        }

        img {
          display: block;
          margin: 20px auto;
          max-width: 500px;
          max-height: 400px;
          border: 1px solid #ccc;
        }

        footer {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          text-align: right;
          font-size: 12px;
          border-top: 1px solid #000;
        }

        .page-number:after {
          content: counter(page);
        }

        @media print {
          footer {
            position: fixed;
          }
        }
      </style>
    </head>

    <body>

      <header>
        Relatório Técnico de Equipamentos
      </header>

      <main>

        <!-- ✅ DADOS APENAS NA PRIMEIRA PÁGINA -->
        <div class="primeira-pagina">
          <p><strong>Projeto:</strong> REFIT</p>
          <p><strong>Loja:</strong> 238</p>
          <p><strong>Responsável:</strong> Diego</p>
          <p><strong>Data:</strong> 27/03/2026, 09:31:28</p>
          <p><strong>Início:</strong> 01/01/2026</p>
          <p><strong>Término:</strong> 03/02/2026</p>
          <hr>
        </div>

        <!-- ✅ CONTEÚDO DINÂMICO -->
        ${conteudo}

      </main>

      <footer>
        Página <span class="page-number"></span>
      </footer>

    </body>
    </html>
  `);

  janela.document.close();
  janela.focus();

  setTimeout(() => {
    janela.print();
  }, 500);
}
</script>
