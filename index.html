<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist de Equipamentos</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  margin: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  cursor: pointer;
}

.add-btn { background: green; color: white; width: 100%; }
.print-btn { background: #007bff; color: white; width: 100%; }

img {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Checklist de Equipamentos</h2>

<div class="card">

<label>Projeto</label>
<input type="text" id="projeto">

<label>Loja</label>
<input type="text" id="loja">

<label>Responsável</label>
<input type="text" id="responsavel">

<label>Data</label>
<input type="text" id="data" readonly>

<label>Início do Atendimento</label>
<input type="text" id="inicio">

<label>Término do Atendimento</label>
<input type="text" id="fim">

</div>

<div id="equipamentos"></div>

<button class="add-btn" onclick="adicionarEquipamento()">+ Equipamento</button>
<button class="print-btn" onclick="imprimirChecklist()">Consolidar / Imprimir</button>

</div>

<script>
let contador = 0;

document.getElementById("data").value = new Date().toLocaleString();

function adicionarEquipamento() {
  contador++;

  const div = document.createElement("div");
  div.classList.add("card");

  div.innerHTML = `
    <h3>Equipamento ${contador}</h3>

    <label>Nome</label>
    <input type="text" class="nome">

    <label>Status</label>
    <select class="status">
      <option>Funcionando</option>
      <option>Com problema</option>
      <option>Não funciona</option>
    </select>

    <label>Fotos</label>
    <div id="fotos_${contador}"></div>
    <button type="button" onclick="adicionarFoto(${contador})">+ Foto</button>

    <label>Observações</label>
    <textarea class="obs"></textarea>

    <label>Técnico</label>
    <input type="text" class="tecnico">

    <label>Analista</label>
    <input type="text" class="analista">
  `;

  document.getElementById("equipamentos").appendChild(div);
  adicionarFoto(contador);
}

function adicionarFoto(id) {
  const container = document.getElementById("fotos_" + id);
  const index = container.children.length;

  const div = document.createElement("div");

  div.innerHTML = `
    <input type="file" accept="image/*" onchange="previewImagem(event, '${id}_${index}')">
    <img id="preview_${id}_${index}" style="display:none;">
  `;

  container.appendChild(div);
}

function previewImagem(event, id) {
  const img = document.getElementById("preview_" + id);
  const file = event.target.files[0];

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      img.src = e.target.result;
      img.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
}

function imprimirChecklist() {

  let html = `
  <html>
  <head>
  <style>

    @page {
      margin: 100px 40px 60px 40px;
    }

    body {
      font-family: Arial;
    }

    header {
      position: fixed;
      top: -80px;
      left: 0;
      right: 0;
      height: 60px;
      text-align: center;
      border-bottom: 2px solid #000;
    }

    header h2 {
      margin: 0;
      line-height: 60px;
    }

    footer {
      position: fixed;
      bottom: -40px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
    }

    .pagenum:before {
      content: counter(page);
    }

    .bloco {
      page-break-inside: avoid;
      margin-bottom: 20px;
    }

    .foto {
      display: block;
      margin: 15px auto;
      max-width: 500px;
      max-height: 400px;
      object-fit: contain;
      border: 1px solid #ccc;
      padding: 5px;
    }

    hr {
      margin: 20px 0;
    }

  </style>
  </head>

  <body>

  <header>
    <h2>Relatório Técnico de Equipamentos</h2>
  </header>

  <footer>
    Página <span class="pagenum"></span>
  </footer>

  <main>

  <p><strong>Projeto:</strong> ${document.getElementById("projeto").value}</p>
  <p><strong>Loja:</strong> ${document.getElementById("loja").value}</p>
  <p><strong>Responsável:</strong> ${document.getElementById("responsavel").value}</p>
  <p><strong>Data:</strong> ${document.getElementById("data").value}</p>
  <p><strong>Início:</strong> ${document.getElementById("inicio").value}</p>
  <p><strong>Término:</strong> ${document.getElementById("fim").value}</p>
  `;

  const equipamentos = document.querySelectorAll("#equipamentos .card");

  equipamentos.forEach((eq, i) => {

    const nome = eq.querySelector(".nome").value;
    const status = eq.querySelector(".status").value;
    const obs = eq.querySelector(".obs").value;
    const tecnico = eq.querySelector(".tecnico").value;
    const analista = eq.querySelector(".analista").value;

    html += `<div class="bloco">`;

    html += `
      <hr>
      <h3>Equipamento ${i + 1}</h3>
      <p><strong>Nome:</strong> ${nome}</p>
      <p><strong>Status:</strong> ${status}</p>
      <p><strong>Observações:</strong> ${obs}</p>
      <p><strong>Técnico:</strong> ${tecnico}</p>
      <p><strong>Analista:</strong> ${analista}</p>
    `;

    const imgs = eq.querySelectorAll("img");

    imgs.forEach(img => {
      if (img.src) {
        html += `<img src="${img.src}" class="foto">`;
      }
    });

    html += `</div>`;
  });

  html += `</main></body></html>`;

  const win = window.open("", "_blank");
  win.document.write(html);
  win.document.close();
  win.print();
}

adicionarEquipamento();

</script>

</body>
</html>
