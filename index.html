<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist</title>

<style>
body { font-family: Arial; margin: 20px; background: #f4f4f4; }

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  border: none;
  cursor: pointer;
}

.add { background: green; color: white; }
.print { background: blue; color: white; }

img {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Checklist</h2>

<div class="card">
<label>Projeto</label>
<input id="projeto">

<label>Loja</label>
<input id="loja">

<label>Responsável</label>
<input id="responsavel">

<label>Data</label>
<input id="data" readonly>

<label>Início</label>
<input id="inicio">

<label>Término</label>
<input id="fim">
</div>

<div id="equipamentos"></div>

<button class="add" onclick="addEq()">+ Equipamento</button>
<button class="print" onclick="printar()">Consolidar / Imprimir</button>

</div>

<script>
document.getElementById("data").value = new Date().toLocaleString();

let count = 0;

function addEq() {
  count++;

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>Equipamento ${count}</h3>
    <input placeholder="Nome" class="nome">

    <select class="status">
      <option>OK</option>
      <option>Problema</option>
    </select>

    <input type="file" onchange="preview(event,this)">
    <img style="display:none">

    <textarea placeholder="Observação" class="obs"></textarea>
  `;

  document.getElementById("equipamentos").appendChild(div);
}

function preview(e, input) {
  const img = input.nextElementSibling;
  const file = e.target.files[0];

  if (file) {
    const reader = new FileReader();
    reader.onload = ev => {
      img.src = ev.target.result;
      img.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
}

function printar() {

  const eqs = document.querySelectorAll(".card");
  let html = "";

  eqs.forEach((e,i) => {
    if(i === 0) return;

    html += `
      <h3>Equipamento ${i}</h3>
      <p>${e.querySelector(".nome")?.value || ""}</p>
      <p>${e.querySelector(".status")?.value || ""}</p>
      <p>${e.querySelector(".obs")?.value || ""}</p>
    `;

    const img = e.querySelector("img");
    if(img && img.src) {
      html += `<img src="${img.src}" style="max-width:400px">`;
    }
  });

  const w = window.open();

  w.document.write(`
    <html>
    <body style="font-family:Arial">

    <h2 style="text-align:center">Relatório Técnico</h2>

    <p>Projeto: ${projeto.value}</p>
    <p>Loja: ${loja.value}</p>
    <p>Responsável: ${responsavel.value}</p>
    <p>Data: ${data.value}</p>
    <p>Início: ${inicio.value}</p>
    <p>Término: ${fim.value}</p>

    <hr>

    ${html}

    </body>
    </html>
  `);

  w.document.close();

  setTimeout(()=>w.print(),500);
}

addEq();
</script>

</body>
</html>
